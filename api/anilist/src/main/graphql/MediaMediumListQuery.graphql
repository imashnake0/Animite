query MediaMediumListQuery(
    $type: MediaType,
    $page: Int,
    $perPage: Int,
    $sort: [MediaSort],
    $genre: String,
    $genreIn: [String],
    $genreNotIn: [String],
    $season: MediaSeason,
    $startDate: FuzzyDateInt,
    $endDate: FuzzyDateInt,
    $formatIn: [MediaFormat],
    $formatNotIn: [MediaFormat],
    $search: String,
) {
    page: Page (
        page: $page,
        perPage: $perPage
    ) {
        media(
            type: $type,
            sort: $sort,
            genre: $genre,
            genre_in: $genreIn,
            genre_not_in: $genreNotIn,
            season: $season,
            startDate_greater: $startDate,
            startDate_lesser: $endDate,
            format_in: $formatIn,
            format_not_in: $formatNotIn
            search: $search,
            isAdult: false
        ) {
            ...MediaMedium
        }
    }
}
